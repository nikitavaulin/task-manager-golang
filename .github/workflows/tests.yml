name: Go

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
  
    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        
    - name: Display Go version
      run: go version

    - name: Install dependencies
      run: go mod tidy

    - name: Run local server
      env:
        TODO_PORT: 8080
        TODO_DBFILE: ${{ secrets.TODO_DBFILE }}
        HTTP_SHUTDOWN_DURATION: ${{ secrets.HTTP_SHUTDOWN_DURATION }}
        TODO_PASSWORD: ${{ secrets.TODO_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        CGO_ENABLED=0 GOOS=linux go run ./cmd/main.go &
        sleep 100
        go test -run ^TestApp$ ./tests
        
        
